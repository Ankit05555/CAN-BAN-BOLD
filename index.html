<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kanban Board</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
  header{padding:16px 24px;background:#1a1d27;border-bottom:1px solid #2d3148;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:16px;font-weight:600}
  #meta{font-size:12px;color:#6b7280}
  #board{display:flex;gap:14px;padding:20px 24px;flex:1;overflow-x:auto;align-items:flex-start}
  .col{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;width:260px;min-width:260px;display:flex;flex-direction:column}
  .col.over{background:#1e2235}
  .col-head{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2d3148}
  .col-label{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:7px;color:#9ca3af}
  .dot{width:7px;height:7px;border-radius:50%}
  .dot-todo{background:#6b7280}.dot-prog{background:#f59e0b}.dot-done{background:#10b981}
  .col-count{font-size:11px;background:#2d3148;color:#6b7280;border-radius:999px;padding:1px 8px}
  .cards{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:40px;flex:1}
  .card{background:#252836;border:1px solid #2d3148;border-radius:8px;padding:10px 12px;cursor:grab;display:flex;align-items:flex-start;gap:8px;transition:border-color .15s;user-select:none}
  .card:hover{border-color:#4b5563}
  .card.dragging{opacity:.35;cursor:grabbing}
  .card-text{font-size:13px;flex:1;line-height:1.5;word-break:break-word}
  .del{background:none;border:none;cursor:pointer;color:#4b5563;font-size:14px;padding:0;flex-shrink:0;transition:color .15s}
  .del:hover{color:#ef4444}
  .add-area{padding:6px 8px 8px;border-top:1px solid #2d3148}
  textarea{width:100%;background:#0f1117;border:1px solid #2d3148;border-radius:8px;color:#e2e8f0;font-family:inherit;font-size:13px;padding:7px 9px;resize:none;height:58px;display:none}
  textarea:focus{outline:none;border-color:#6366f1}
  textarea.show{display:block}
  .btn-confirm{background:#6366f1;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;display:none;margin-top:5px}
  .btn-confirm:hover{background:#4f46e5}
  .btn-confirm.show{display:inline-block}
  .btn-open{width:100%;background:none
